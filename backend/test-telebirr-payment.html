<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telebirr Payment Test - FoodieGo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }
        
        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .result {
            margin-top: 20px;
            padding: 16px;
            border-radius: 10px;
            font-size: 14px;
            display: none;
        }
        
        .result.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .result.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .result.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        
        .payment-url {
            margin-top: 10px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 5px;
            word-break: break-all;
            font-size: 12px;
        }
        
        .open-payment {
            margin-top: 10px;
            padding: 12px;
            background: #28a745;
            color: white;
            text-decoration: none;
            display: inline-block;
            border-radius: 8px;
            font-weight: 600;
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
            font-size: 48px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🍔</div>
        <h1>Telebirr Payment Test</h1>
        <p class="subtitle">Test your FoodieGo Telebirr integration</p>
        
        <form id="paymentForm">
            <div class="form-group">
                <label for="title">Order Title</label>
                <input type="text" id="title" value="FoodieGo Test Order" required>
            </div>
            
            <div class="form-group">
                <label for="amount">Amount (ETB)</label>
                <input type="number" id="amount" value="10" min="1" step="0.01" required>
            </div>
            
            <div class="form-group">
                <label for="orderId">Order ID (optional - leave empty for test)</label>
                <input type="text" id="orderId" placeholder="Leave empty for test payment">
                <small style="color: #666; font-size: 12px; display: block; margin-top: 4px;">
                    Must be a valid MongoDB ObjectId (24 hex characters) or leave empty
                </small>
            </div>
            
            <button type="submit" id="payButton">
                💳 Create Payment
            </button>
        </form>
        
        <div id="result" class="result"></div>
    </div>

    <script>
        // IMPORTANT: Change this to your computer's IP address
        // Find it by running: ipconfig (Windows) or ifconfig (Mac/Linux)
        // Example: const baseUrl = 'http://192.168.1.100:5001/api/payments';
        const baseUrl = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? 'http://localhost:5001/api/payments'
            : `http://${window.location.hostname}:5001/api/payments`;
        
        const form = document.getElementById('paymentForm');
        const payButton = document.getElementById('payButton');
        const resultDiv = document.getElementById('result');

        // Callback function for in-app payment
        window.handleinitDataCallback = function() {
            console.log('Payment callback received');
            showResult('Payment process completed! Check your order status.', 'success');
        };

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const title = document.getElementById('title').value;
            const amount = document.getElementById('amount').value;
            const orderId = document.getElementById('orderId').value;
            
            if (!amount) {
                showResult('Please enter an amount', 'error');
                return;
            }
            
            payButton.disabled = true;
            payButton.textContent = '⏳ Creating payment...';
            
            try {
                // Call create order endpoint
                const response = await fetch(baseUrl + '/create/order', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        title: title,
                        amount: parseFloat(amount),
                        orderId: orderId && orderId.trim() !== '' ? orderId : undefined
                    }),
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const rawRequest = await response.text();
                console.log('Raw Request:', rawRequest);
                
                if (!rawRequest || rawRequest.trim() === '') {
                    throw new Error('Empty response from server');
                }
                
                // Parse the rawRequest to get payment URL
                let paymentData;
                try {
                    paymentData = JSON.parse(rawRequest);
                } catch (e) {
                    // If it's not JSON, it might be the signed request string
                    showResult('Payment request created! (Raw request format)', 'info');
                    showRawRequest(rawRequest);
                    payButton.disabled = false;
                    payButton.textContent = '💳 Create Payment';
                    return;
                }
                
                // Check if we're in Telebirr app
                if (typeof window.consumerapp !== 'undefined' && window.consumerapp !== null) {
                    // In-app payment flow
                    const obj = JSON.stringify({
                        functionName: 'js_fun_start_pay',
                        params: {
                            rawRequest: rawRequest.trim(),
                            functionCallBackName: 'handleinitDataCallback',
                        },
                    });
                    
                    window.consumerapp.evaluate(obj);
                    showResult('Payment initiated in Telebirr app!', 'success');
                } else {
                    // Web payment flow - show payment URL
                    console.log('Not in Telebirr app, showing web payment option');
                    showWebPayment(paymentData);
                }
                
            } catch (error) {
                console.error('Payment error:', error);
                showResult(`Error: ${error.message}`, 'error');
            } finally {
                payButton.disabled = false;
                payButton.textContent = '💳 Create Payment';
            }
        });

        function showResult(message, type) {
            resultDiv.textContent = message;
            resultDiv.className = `result ${type}`;
            resultDiv.style.display = 'block';
        }

        function showRawRequest(rawRequest) {
            const div = document.createElement('div');
            div.className = 'payment-url';
            div.innerHTML = `<strong>Raw Request:</strong><br>${rawRequest.substring(0, 200)}...`;
            resultDiv.appendChild(div);
        }

        function showWebPayment(paymentData) {
            const paymentUrl = paymentData.paymentUrl || paymentData.data?.toPayUrl;
            
            if (paymentUrl) {
                showResult('Payment created successfully!', 'success');
                
                const urlDiv = document.createElement('div');
                urlDiv.className = 'payment-url';
                urlDiv.innerHTML = `<strong>Payment URL:</strong><br>${paymentUrl}`;
                resultDiv.appendChild(urlDiv);
                
                const link = document.createElement('a');
                link.href = paymentUrl;
                link.target = '_blank';
                link.className = 'open-payment';
                link.textContent = '🌐 Open Payment Page';
                resultDiv.appendChild(link);
            } else {
                showResult('Payment created but no URL returned', 'info');
                console.log('Payment data:', paymentData);
            }
        }
    </script>
</body>
</html>
