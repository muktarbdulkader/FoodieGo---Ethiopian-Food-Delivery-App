name: foodiego
description: "FoodieGo - Ethiopian Food Delivery App. Order delicious food from your favorite restaurants."
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  uuid: ^4.5.1
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  image_picker: ^1.0.7
  url_launcher: ^6.3.1
  flutter_local_notifications: ^19.5.0
  mobile_scanner: ^5.2.3  # NEW: QR code scanner
  qr_flutter: ^4.1.0  # NEW: QR code generator (for restaurant dashboard)
  app_links: ^6.3.2  # NEW: Deep link handling for APK
  web: ^1.1.0  # NEW: Modern web API replacement for dart:html
  socket_io_client: ^2.0.3+1  # NEW: WebSocket client for real-time updates
  audioplayers: ^6.1.0  # NEW: Sound alerts for kitchen dashboard
  vibration: ^2.0.0  # NEW: Vibration alerts for mobile devices
  flutter_map: ^7.0.2  # NEW: Interactive OpenStreetMap for location picker
  latlong2: ^0.9.1  # NEW: LatLng coordinates for flutter_map
  share_plus: ^10.0.0  # NEW: Native sharing for referrals

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    # Generic notification sounds (WAV format for better compatibility)
    - assets/sounds/notification.wav
    - assets/sounds/bell.wav
    # English notification sounds
    - assets/sounds/waiter_call_en.wav
    - assets/sounds/new_order_en.wav
    - assets/sounds/order_ready_en.wav
    # Amharic notification sounds
    - assets/sounds/waiter_call_am.wav
    - assets/sounds/new_order_am.wav
    - assets/sounds/order_ready_am.wav
    # Oromo notification sounds
    - assets/sounds/waiter_call_om.wav
    - assets/sounds/new_order_om.wav
    - assets/sounds/order_ready_om.wav
